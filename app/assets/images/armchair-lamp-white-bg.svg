<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- White background -->
  <rect width="400" height="400" fill="#ffffff"/>

  <!-- Background circle -->
  <ellipse cx="200" cy="210" rx="190" ry="185" fill="#F5C97A" opacity="0.5"/>
  <ellipse cx="200" cy="210" rx="155" ry="150" fill="#F5C97A" opacity="0.5"/>

  <!-- Floor lamp -->
  <rect x="48" y="60" width="12" height="240" rx="5" fill="#2C1A0E"/>
  <ellipse cx="54" cy="302" rx="28" ry="8" fill="#2C1A0E"/>
  <polygon points="14,60 94,60 76,12 32,12" fill="#F5F0E0" stroke="#2C1A0E" stroke-width="2.5"/>
  <line x1="14" y1="60" x2="94" y2="60" stroke="#2C1A0E" stroke-width="2.5"/>
  <ellipse cx="54" cy="72" rx="48" ry="20" fill="#FFE08A" opacity="0.4"/>

  <!-- Armchair body -->
  <rect x="110" y="210" width="230" height="85" rx="16" fill="#D4611A"/>
  <rect x="110" y="110" width="230" height="115" rx="18" fill="#E07020"/>
  <!-- Left armrest -->
  <rect x="92" y="148" width="38" height="132" rx="14" fill="#C45510"/>
  <!-- Right armrest -->
  <rect x="302" y="148" width="38" height="132" rx="14" fill="#C45510"/>
  <!-- Seat highlight -->
  <ellipse cx="225" cy="220" rx="80" ry="13" fill="#E8892A" opacity="0.5"/>
  <!-- Back cushion center line -->
  <line x1="225" y1="118" x2="225" y2="210" stroke="#C45510" stroke-width="2.5" opacity="0.4"/>

  <!-- Chair legs -->
  <rect x="126" y="285" width="18" height="45" rx="6" fill="#2C1A0E"/>
  <rect x="298" y="285" width="18" height="45" rx="6" fill="#2C1A0E"/>
  <rect x="154" y="285" width="18" height="38" rx="6" fill="#2C1A0E"/>
  <rect x="270" y="285" width="18" height="38" rx="6" fill="#2C1A0E"/>

  <!-- Shadow under chair -->
  <ellipse cx="225" cy="334" rx="110" ry="10" fill="#1a0a00" opacity="0.2"/>

  <!-- Plant pot -->
  <polygon points="310,322 352,322 346,370 316,370" fill="#2C1A0E"/>
  <rect x="307" y="315" width="48" height="11" rx="4" fill="#3a2510"/>
  <!-- Plant stems -->
  <path d="M331 316 Q316 284 298 264" stroke="#3a7a2a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M331 316 Q327 278 320 254" stroke="#3a7a2a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M331 316 Q346 282 360 264" stroke="#3a7a2a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Leaves -->
  <ellipse cx="294" cy="260" rx="20" ry="11" fill="#4a9a35" transform="rotate(-30 294 260)"/>
  <ellipse cx="319" cy="249" rx="20" ry="11" fill="#5aaa40" transform="rotate(-5 319 249)"/>
  <ellipse cx="363" cy="260" rx="20" ry="11" fill="#4a9a35" transform="rotate(25 363 260)"/>
</svg>
